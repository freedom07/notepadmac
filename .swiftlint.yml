included:
  - Sources
  - Tests
excluded:
  - .build
  - docs
disabled_rules:
  - trailing_whitespace
  - line_length
  - function_body_length
  - file_length
  - type_body_length
  - cyclomatic_complexity
opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
analyzer_rules:
  - unused_import
reporter: xcode
