<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2D3A"/>
      <stop offset="100%" stop-color="#1A1A24"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#A29BFE"/>
    </linearGradient>
  </defs>
  <!-- macOS squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bg2)"/>
  <rect x="20" y="20" width="472" height="472" rx="108" ry="108" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Editor window frame -->
  <rect x="88" y="100" width="336" height="312" rx="12" fill="#1E1E28"/>
  <rect x="88" y="100" width="336" height="312" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="88" y="100" width="336" height="32" rx="12" fill="#252532"/>
  <rect x="88" y="120" width="336" height="12" fill="#252532"/>
  <!-- Traffic lights -->
  <circle cx="112" cy="116" r="6" fill="#FF5F57"/>
  <circle cx="132" cy="116" r="6" fill="#FEBC2E"/>
  <circle cx="152" cy="116" r="6" fill="#28C840"/>
  <!-- Line numbers -->
  <text x="104" y="158" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">1</text>
  <text x="104" y="178" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">2</text>
  <text x="104" y="198" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">3</text>
  <text x="104" y="218" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">4</text>
  <text x="104" y="238" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">5</text>
  <text x="104" y="258" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">6</text>
  <text x="104" y="278" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">7</text>
  <text x="104" y="298" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#555568">8</text>
  <!-- Separator line -->
  <line x1="120" y1="140" x2="120" y2="400" stroke="#333345" stroke-width="1"/>
  <!-- Syntax highlighted code lines -->
  <rect x="128" y="148" width="56" height="12" rx="2" fill="#C792EA" opacity="0.9"/>
  <rect x="190" y="148" width="80" height="12" rx="2" fill="#82AAFF" opacity="0.8"/>
  <rect x="128" y="168" width="40" height="12" rx="2" fill="#89DDFF" opacity="0.7"/>
  <rect x="174" y="168" width="100" height="12" rx="2" fill="#C3E88D" opacity="0.7"/>
  <rect x="128" y="188" width="70" height="12" rx="2" fill="#F78C6C" opacity="0.8"/>
  <rect x="204" y="188" width="50" height="12" rx="2" fill="#FFCB6B" opacity="0.7"/>
  <rect x="128" y="208" width="30" height="12" rx="2" fill="#89DDFF" opacity="0.6"/>
  <rect x="164" y="208" width="120" height="12" rx="2" fill="#82AAFF" opacity="0.6"/>
  <rect x="128" y="228" width="90" height="12" rx="2" fill="#C792EA" opacity="0.7"/>
  <rect x="128" y="248" width="60" height="12" rx="2" fill="#C3E88D" opacity="0.6"/>
  <rect x="194" y="248" width="70" height="12" rx="2" fill="#F78C6C" opacity="0.6"/>
  <rect x="128" y="268" width="45" height="12" rx="2" fill="#89DDFF" opacity="0.5"/>
  <rect x="128" y="288" width="80" height="12" rx="2" fill="#82AAFF" opacity="0.5"/>
  <!-- Active line highlight -->
  <rect x="122" y="186" width="296" height="16" rx="2" fill="#6C5CE7" opacity="0.08"/>
  <!-- Cursor -->
  <rect x="258" y="188" width="2" height="12" rx="1" fill="#A29BFE"/>
  <!-- Bottom accent bar -->
  <rect x="88" y="400" width="336" height="12" rx="0" fill="url(#accent2)" opacity="0.6"/>
  <rect x="88" y="400" width="336" height="12" rx="0 0 12 12" fill="url(#accent2)" opacity="0.3"/>
</svg>